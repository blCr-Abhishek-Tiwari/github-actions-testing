name: Deployment

on: 
    push:
        branches:
            - main

    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                node-version: '24'
            - name: Configure npm for cache usage
              run: |
                npm config set prefer-offline true # use cached packages first, only go to internet if cache is missing
                npm config set fund false # hides “funding messages” to reduce noise in logs
                npm config set audit false # disables automatic security audits to speed up install to reduce noise in logs

            - name: Cache Node.js modules
              id: cache
              uses: actions/cache@v3
              with:
                path: |
                    ~/.npm
                    node_modules
                key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

            - name: Install dependencies
            #   if: steps.cache.outputs.cache-hit != 'true'
              run: npm install

            - name: Build and deploy
              run: |
                npm ls --depth=0 || true 
                echo "Building and deploying the application..."
                # Add your build and deployment commands here