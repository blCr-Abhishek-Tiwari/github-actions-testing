name: Backend Rollback

# Event
on:
  # Rollbacks should always be manual triggers
  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment for Rollback"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      run_id:
        description: "The GitHub Actions Run ID of the known-good deployment"
        required: true
        type: string

jobs:
  execute-rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Download Known-Good Artifact
        # Using v4 to match your deployment pipeline
        uses: actions/download-artifact@v8.0.1
        with:
          name: deploy-files
          # Targets the specific successful run you want to restore
          run-id: ${{ inputs.run_id }} 
          # Required to download artifacts from a different workflow run
          github-token: ${{ secrets.TOKEN }} 
          path: deploy/

      - name: Verify Rollback Files
        run: |
          echo "Verifying files downloaded from Run ID: ${{ inputs.run_id }}"
          ls -la deploy/
          
      - name: Execute Rollback Deployment
        run: |
          echo "WARNING: Initiating rollback to ${{ inputs.environment }} environment!"
          echo "Simulating deployment of the restored artifact..."
          # ---------------------------------------------------------
          # TODO: Insert your actual platform deployment commands here 
          # (e.g., AWS CLI, SCP, Docker push, Render webhook, etc.)
          # ---------------------------------------------------------
          echo "Rollback complete."